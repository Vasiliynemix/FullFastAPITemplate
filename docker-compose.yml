# ============================================================
# DEV-инфраструктура: всё в Docker.
# Бэкенд через uvicorn --reload, проброс кода как volume для горячей перезагрузки.
# Nginx/certbot включены, но для локалки HTTPS работает на self-signed (см. nginx setup).
# ============================================================
name: fastapi-dev

x-backend-env: &backend-env
  env_file: .env

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    <<: *backend-env
    environment:
      ENVIRONMENT: dev
      LOG_JSON: "false"
    # В dev: миграции + uvicorn с автоперезагрузкой
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
    expose:
      - "8080"
    ports:
      - "${APP_HOST_PORT:-8080}:8080"   # прямой доступ к API в обход nginx (удобно для dev)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Брокеры опциональны: ждём, ТОЛЬКО если контейнер поднят (профиль активен).
      # required:false -> для внешнего брокера (другой сервер) зависимость игнорируется,
      # локальный контейнер при этом НЕ поднимается.
      kafka:
        condition: service_healthy
        required: false
      rabbitmq:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Воркер периодических задач — ТОТ ЖЕ образ, другая команда. ОДИН экземпляр
  # (никаких replicas — задачи не должны дублироваться). Миграции не запускает
  # (RUN_MIGRATIONS=0) — это делает backend.
  worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    <<: *backend-env
    environment:
      ENVIRONMENT: dev
      LOG_JSON: "false"
      RUN_MIGRATIONS: "0"
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
        required: false
      rabbitmq:
        condition: service_healthy
        required: false
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    # Тюнинг под нагрузку: больше соединений и shared_buffers
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=8MB"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Только host-сторона настраивается через .env (если 5432 занят локальным PG).
      # Внутри docker-сети порт всегда 5432 — вариант A не ломается.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      - "redis-server"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--appendonly"
      - "no"
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # --- Брокеры (опциональны, за профилями) ---
  # Стартуют ТОЛЬКО если активен профиль: COMPOSE_PROFILES=kafka|rabbitmq в .env.
  # Для memory или ВНЕШНЕГО брокера (другой сервер) контейнер не поднимается —
  # приложение коннектится по BROKER_URL. Кастомные Dockerfile не нужны (офиц. образы).

  # RabbitMQ + management UI (http://localhost:15672). BROKER_URL=amqp://user:pass@rabbitmq:5672/
  rabbitmq:
    image: rabbitmq:3-management-alpine
    profiles: ["rabbitmq"]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_UI_PORT:-15672}:15672"   # web-консоль (только UI; AMQP 5672 — внутри сети)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Kafka в KRaft-режиме (без Zookeeper), один узел. BROKER_URL=kafka:9092
  kafka:
    image: apache/kafka:latest
    profiles: ["kafka"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
    restart: unless-stopped

  nginx:
    build:
      context: docker/nginx
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
    ports:
      - "${HTTP_HOST_PORT:-80}:80"
      - "${HTTPS_HOST_PORT:-443}:443"
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  certbot_conf:
  certbot_www:
  rabbitmq_data:
  kafka_data:
