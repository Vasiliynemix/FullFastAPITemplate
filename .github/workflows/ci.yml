name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Отменяем устаревшие прогоны при новых пушах в ту же ветку/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv venv
      - run: uv pip install -e ".[dev]"
      - name: Ruff lint
        run: uv run ruff check app tests
      - name: Ruff format check
        run: uv run ruff format --check app tests
      - name: Mypy (type check)
        run: uv run mypy

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv venv
      - run: uv pip install -e ".[dev]"
      # Тесты самодостаточны: БД = SQLite в памяти, Redis = fakeredis, брокер = in-memory.
      # Внешние сервисы для CI не нужны.
      - name: Pytest
        run: uv run pytest -q

  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]   # собираем образ только если линт и тесты прошли
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: false           # шаблон: только проверяем, что образ собирается
          tags: full-fastapi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
