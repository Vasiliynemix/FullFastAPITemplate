# Pre-commit хуки: ruff (lint+format), базовые проверки, mypy.
# Установка: make hooks   (или: uv run pre-commit install)
# Прогон вручную по всем файлам: uv run pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
        # --unsafe: только синтаксис, без загрузки тегов — в compose есть !override/!reset
        args: ["--unsafe"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff           # линт с автофиксом
        args: ["--fix"]
      - id: ruff-format    # форматирование

  # mypy запускаем из проектного окружения (нужны наши зависимости для типов)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
