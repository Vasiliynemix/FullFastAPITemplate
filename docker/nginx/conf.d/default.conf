# ============================================================
# Виртуальный хост: HTTP -> HTTPS редирект + ACME challenge + проксирование
# Замените server_name на ваш домен. SERVER_NAME подставляется через envsubst
# в docker-entrypoint.d/40-envsubst.sh (по умолчанию localhost).
# ============================================================

# --- HTTP: отдаём ACME-challenge (certbot) и редиректим на HTTPS ---
server {
    listen       80;
    listen       [::]:80;
    server_name  ${SERVER_NAME};

    # Webroot для проверки домена certbot'ом
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health доступен по HTTP (для LB, без редиректа)
    location /health/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: основной трафик ---
server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    http2        on;
    server_name  ${SERVER_NAME};

    # Сертификаты Let's Encrypt (том certbot). Для локалки см. self-signed fallback.
    ssl_certificate     /etc/letsencrypt/live/${SERVER_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${SERVER_NAME}/privkey.pem;

    # --- TLS hardening ---
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # --- Security headers (production-grade) ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy    "default-src 'self'" always;

    # --- Rate / connection limits ---
    limit_req  zone=api_limit burst=400 nodelay;
    limit_conn conn_limit 100;

    # --- Документация (Swagger/ReDoc) ---
    # Swagger UI грузит CSS/JS с cdn.jsdelivr.net, favicon с fastapi.tiangolo.com и
    # выполняет inline-скрипт инициализации — строгий default-src 'self' это рубит.
    # Ослабляем CSP ТОЛЬКО на путях документации (они под Basic Auth, см. register_docs).
    # ВАЖНО: наличие add_header в location ОТМЕНЯЕТ наследование server-level add_header,
    # поэтому остальные security-заголовки здесь дублируем явно.
    location ~ ^/(docs|redoc|openapi\.json)$ {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data: https://fastapi.tiangolo.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net" always;

        proxy_pass http://backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    location / {
        proxy_pass http://backend_upstream;

        # Корректная передача клиентских данных приложению
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Прокидываем/генерируем request-id для сквозной трассировки
        proxy_set_header X-Request-ID      $request_id;

        # keepalive к upstream требует HTTP/1.1 и пустого Connection
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # Таймауты
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Стриминг (NDJSON / SSE) — отключаем буферизацию ответа
        proxy_buffering off;
    }
}
