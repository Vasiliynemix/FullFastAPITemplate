# ============================================================
# Nginx — глобальная конфигурация под высокую нагрузку
# ============================================================
user  nginx;
# auto = по числу ядер CPU
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  16384;   # потолок одновременных соединений на воркер
    multi_accept        on;
    use                 epoll;    # эффективный event-механизм на Linux
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Производительность ---
    sendfile            on;
    tcp_nopush          on;       # отправлять заголовки одним пакетом
    tcp_nodelay         on;       # не задерживать мелкие пакеты (низкая латентность)
    keepalive_timeout   65;
    keepalive_requests  1000;     # запросов на одно keep-alive соединение
    types_hash_max_size 2048;
    server_tokens       off;      # не светим версию nginx

    # --- Буферы (защита от медленных клиентов / больших заголовков) ---
    client_max_body_size       10m;
    client_body_buffer_size    128k;
    client_header_buffer_size  4k;
    large_client_header_buffers 4 16k;

    # --- Сжатие ---
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        application/json application/javascript text/plain text/css
                      application/x-ndjson text/xml application/xml;

    # --- Логи в JSON (совместимо с коллекторами) ---
    log_format json_combined escape=json
        '{'
          '"time":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"method":"$request_method",'
          '"uri":"$uri",'
          '"status":$status,'
          '"request_time":$request_time,'
          '"upstream_time":"$upstream_response_time",'
          '"bytes_sent":$bytes_sent,'
          '"request_id":"$http_x_request_id"'
        '}';
    access_log /var/log/nginx/access.log json_combined buffer=64k flush=5s;

    # --- Rate limit на уровне Nginx (первый барьер до приложения) ---
    limit_req_zone  $binary_remote_addr zone=api_limit:20m rate=200r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # --- Upstream к бэкенду с keepalive-пулом ---
    upstream backend_upstream {
        # least_conn — балансировка по наименее загруженному воркеру
        least_conn;
        server backend:8080 max_fails=3 fail_timeout=10s;
        # Пул постоянных соединений к backend — меньше TCP-handshake под нагрузкой
        keepalive 64;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    include /etc/nginx/conf.d/*.conf;
}
